<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AKP 관리자</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    font-size: 0.95rem;
    background: #f8f9fa;
    color: #212529;
    min-height: 100vh;
    padding: 24px 16px;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ── 카드 공통 ── */
  .card {
    background: #fff;
    border-radius: 8px;
    border: 1px solid #e2e8f0;
    padding: 20px 24px;
  }

  .card-title {
    font-size: 0.8rem;
    font-weight: 700;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 14px;
  }

  /* ── 헤더 카드 ── */
  .header-card {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .header-card .brand {
    font-size: 1.15rem;
    font-weight: 700;
    color: #1e293b;
  }

  .header-card .greeting {
    font-size: 0.88rem;
    color: #475569;
    margin-right: auto;
  }

  .header-card .back-link {
    font-size: 0.82rem;
    color: #64748b;
    text-decoration: none;
    padding: 5px 10px;
    border-radius: 5px;
    border: 1px solid #cbd5e1;
    transition: background 0.15s;
  }

  .header-card .back-link:hover { background: #f1f5f9; }

  /* ── 입력 공통 ── */
  input[type="text"],
  input[type="email"],
  input[type="number"] {
    border: 1px solid #cbd5e1;
    border-radius: 6px;
    padding: 7px 11px;
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    background: #fff;
    color: #1e293b;
  }

  input:focus {
    border-color: #6366f1;
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
  }

  /* ── 버튼 공통 ── */
  button {
    cursor: pointer;
    border: none;
    border-radius: 6px;
    font-size: 0.82rem;
    font-weight: 600;
    padding: 7px 14px;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }

  button:hover { opacity: 0.85; }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

  .btn-primary   { background: #6366f1; color: #fff; }
  .btn-success   { background: #22c55e; color: #fff; }
  .btn-warning   { background: #f97316; color: #fff; }
  .btn-danger    { background: #ef4444; color: #fff; }
  .btn-secondary { background: #e2e8f0; color: #475569; }
  .btn-logout    { background: #f1f5f9; color: #64748b; border: 1px solid #cbd5e1; }
  .btn-logout:hover { background: #fee2e2; color: #dc2626; border-color: #fca5a5; opacity: 1; }

  .btn-sm {
    font-size: 0.76rem;
    padding: 4px 10px;
    border-radius: 5px;
  }

  /* ── 사용자 추가 폼 ── */
  .add-user-form {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .add-user-form .field {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .add-user-form label {
    font-size: 0.85rem;
    color: #475569;
    white-space: nowrap;
  }

  #add-name  { width: 120px; }
  #add-email { width: 210px; }
  #add-cap   { width: 80px; }

  /* ── 테이블 공통 ── */
  .table-wrap {
    overflow-x: auto;
    border-radius: 6px;
    border: 1px solid #e2e8f0;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }

  thead tr { background: #f1f5f9; }

  thead th {
    padding: 10px 12px;
    text-align: left;
    font-weight: 700;
    color: #475569;
    white-space: nowrap;
    border-bottom: 1px solid #e2e8f0;
  }

  tbody tr {
    border-bottom: 1px solid #f1f5f9;
    transition: background 0.1s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:nth-child(even) { background: #fafafa; }
  tbody tr:hover { background: #f8faff; }

  tbody tr.inactive {
    opacity: 0.6;
    color: #94a3b8;
  }

  tbody td {
    padding: 9px 12px;
    vertical-align: middle;
  }

  /* 이메일 셀 — 복사 가능 */
  .email-cell {
    font-size: 0.82rem;
    color: #4f46e5;
    cursor: pointer;
    font-family: 'Consolas', 'Courier New', monospace;
    white-space: nowrap;
    transition: color 0.15s;
  }

  .email-cell:hover { color: #6366f1; text-decoration: underline; }

  /* 비용 색상 */
  .cost-warn   { color: #f97316; font-weight: 600; }
  .cost-exceed { color: #ef4444; font-weight: 700; }

  /* 상태 뱃지 */
  .status-badge {
    display: inline-block;
    font-size: 0.72rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .badge-active   { background: #dcfce7; color: #15803d; }
  .badge-inactive { background: #f1f5f9; color: #94a3b8; }

  .actions { display: flex; gap: 5px; align-items: center; flex-wrap: nowrap; }

  /* 한도 인라인 편집 */
  .cap-edit-wrap {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .cap-edit-wrap input {
    width: 70px;
    padding: 3px 7px;
    font-size: 0.8rem;
  }

  /* 한도 텍스트 — 클릭 가능 암시 */
  .cap-clickable {
    cursor: pointer;
    border-bottom: 1px dashed #94a3b8;
    white-space: nowrap;
  }

  .cap-clickable:hover { color: #6366f1; border-color: #6366f1; }

  /* ── 검수 수정 내역 ── */
  .corrections-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  #corrections-summary {
    font-size: 0.85rem;
    font-weight: 400;
    color: #64748b;
  }

  /* ── 빈 상태 ── */
  .empty-row td {
    text-align: center;
    color: #94a3b8;
    padding: 28px 0;
    font-size: 0.85rem;
  }

  /* ── 로딩 오버레이 ── */
  #loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(248, 249, 250, 0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }

  .loading-text {
    font-size: 0.95rem;
    color: #475569;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* ── 로딩 스피너 ── */
  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(99, 102, 241, 0.25);
    border-top-color: #6366f1;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 4px;
  }

  .spinner-white {
    border-color: rgba(255,255,255,0.3);
    border-top-color: #fff;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 토스트 ── */
  #toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: #1e293b;
    color: #fff;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 0.85rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    z-index: 9999;
    max-width: 340px;
  }

  #toast.show { opacity: 1; }
  #toast.error { background: #dc2626; }
</style>
</head>
<body>

<!-- 로딩 오버레이 -->
<div id="loading-overlay">
  <div class="loading-text">
    <span class="spinner"></span>
    인증 확인 중...
  </div>
</div>

<div class="container" id="main-content" style="display:none;">

  <!-- 헤더 -->
  <div class="card header-card">
    <span class="brand">AKP 관리자</span>
    <span class="greeting" id="greeting">안녕하세요</span>
    <button class="btn-logout" onclick="doLogout()">로그아웃</button>
    <a class="back-link" href="/">&#8592; 변환기로</a>
  </div>

  <!-- 사용자 추가 -->
  <div class="card">
    <div class="card-title">사용자 추가</div>
    <div class="add-user-form">
      <div class="field">
        <label for="add-name">이름:</label>
        <input id="add-name" type="text" placeholder="김선생">
      </div>
      <div class="field">
        <label for="add-email">이메일:</label>
        <input id="add-email" type="email" placeholder="teacher@gmail.com">
      </div>
      <div class="field">
        <label for="add-cap">한도:</label>
        <input id="add-cap" type="number" min="0" step="0.5" value="2.0" placeholder="USD">
        <span style="font-size:0.82rem;color:#64748b;">USD &nbsp;(0 = 무제한)</span>
      </div>
      <div class="field">
        <label for="add-role">역할:</label>
        <select id="add-role" style="border:1px solid #cbd5e1;border-radius:6px;padding:6px 10px;font-size:0.85rem;background:#fff;outline:none;">
          <option value="tier1">기본</option>
          <option value="tier2">그림완성</option>
          <option value="tier3">타이퍼</option>
          <option value="tier4">해설</option>
          <option value="staff">직원</option>
        </select>
      </div>
      <button class="btn-primary" id="add-btn" onclick="doAddUser()">사용자 추가</button>
    </div>
  </div>

  <!-- 등록된 사용자 목록 -->
  <div class="card">
    <div class="card-title">등록된 사용자</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>이름</th>
            <th>이메일</th>
            <th>한도</th>
            <th>오늘</th>
            <th>누적</th>
            <th>상태</th>
            <th>역할</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody id="users-tbody">
          <tr class="empty-row"><td colspan="8"><span class="spinner"></span> 불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 직원 검수 수정 로그 -->
  <div class="card">
    <div class="corrections-header">
      <div class="card-title" style="margin-bottom:0;">직원 검수 수정 로그</div>
      <span id="corrections-summary" style="font-size:0.82rem;color:#64748b;"></span>
    </div>

    <!-- 직원별 통계 -->
    <div id="emp-stats" style="display:flex;flex-wrap:wrap;gap:8px;margin:12px 0 14px;"></div>

    <!-- 필터 바 -->
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:center;">
      <select id="filter-emp" style="border:1px solid #cbd5e1;border-radius:6px;padding:6px 10px;font-size:0.83rem;outline:none;">
        <option value="">전체 직원</option>
      </select>
      <select id="filter-days" style="border:1px solid #cbd5e1;border-radius:6px;padding:6px 10px;font-size:0.83rem;outline:none;">
        <option value="7">최근 7일</option>
        <option value="30" selected>최근 30일</option>
        <option value="90">최근 90일</option>
        <option value="365">최근 1년</option>
      </select>
      <input id="filter-keyword" type="text" placeholder="PDF·문제·메모 검색" style="border:1px solid #cbd5e1;border-radius:6px;padding:6px 10px;font-size:0.83rem;outline:none;width:180px;">
      <label style="display:flex;align-items:center;gap:5px;font-size:0.82rem;color:#475569;cursor:pointer;">
        <input type="checkbox" id="filter-overall" style="cursor:pointer;">
        전체 메모만
      </label>
      <button onclick="loadCorrections()" style="padding:6px 14px;background:#6366f1;color:#fff;border:none;border-radius:6px;font-size:0.82rem;cursor:pointer;">새로고침</button>
      <span id="filter-count" style="font-size:0.8rem;color:#94a3b8;margin-left:4px;"></span>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:90px;">일시</th>
            <th style="width:70px;">직원</th>
            <th style="width:120px;">PDF</th>
            <th style="width:50px;">문제</th>
            <th>원본 OCR 텍스트</th>
            <th>수정 메모 / 수정 내용</th>
            <th style="width:60px;">상태</th>
            <th style="width:60px;"></th>
          </tr>
        </thead>
        <tbody id="corrections-tbody">
          <tr class="empty-row"><td colspan="8"><span class="spinner"></span> 불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 프롬프트 패턴 목록 -->
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap;">
      <div class="card-title" style="margin-bottom:0;">프롬프트 교정 패턴</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:0.78rem;color:#94a3b8;">승인된 패턴은 다음 변환 시 Claude에 자동 주입됩니다</span>
        <button onclick="seedDefaultPatterns()" title="자주 틀리는 기하 표기 등 기본 패턴을 global로 등록 (중복 시 건너뜀)"
          style="padding:6px 12px;border:1px solid #c4b5fd;border-radius:6px;background:#f5f3ff;color:#6d28d9;font-size:0.78rem;font-weight:600;cursor:pointer;white-space:nowrap;">기본 패턴 불러오기</button>
        <button onclick="openPatternModal('manual','','','')" title="검수 내역 없이 패턴을 직접 추가"
          style="padding:6px 12px;border:none;border-radius:6px;background:#6d28d9;color:#fff;font-size:0.78rem;font-weight:600;cursor:pointer;white-space:nowrap;">+ 직접 추가</button>
      </div>
    </div>
    <div id="patterns-list">
      <div style="color:#94a3b8;font-size:0.85rem;padding:12px 0;">패턴 없음</div>
    </div>
  </div>

</div><!-- /container -->

<!-- 패턴 등록 모달 -->
<div id="pattern-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:12px;padding:28px 32px;width:480px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.2);">
    <h3 style="font-size:1rem;color:#1e293b;margin-bottom:16px;">패턴 등록 — Claude 프롬프트에 주입</h3>
    <input type="hidden" id="pm-cid">
    <div style="margin-bottom:12px;">
      <label style="font-size:0.82rem;color:#64748b;display:block;margin-bottom:4px;">적용 범위</label>
      <select id="pm-scope" style="border:1px solid #cbd5e1;border-radius:6px;padding:7px 10px;font-size:0.88rem;width:100%;outline:none;">
        <option value="global">전체 공통 (모든 변환에 적용)</option>
        <option value="school">학교별</option>
        <option value="subject">과목별</option>
      </select>
    </div>
    <div id="pm-scope-val-wrap" style="margin-bottom:12px;display:none;">
      <label style="font-size:0.82rem;color:#64748b;display:block;margin-bottom:4px;" id="pm-scope-val-label">값</label>
      <input id="pm-scope-val" type="text" placeholder="예: 경신여고 또는 공수1" style="border:1px solid #cbd5e1;border-radius:6px;padding:7px 10px;font-size:0.88rem;width:100%;outline:none;box-sizing:border-box;">
    </div>
    <div style="margin-bottom:12px;">
      <label style="font-size:0.82rem;color:#64748b;display:block;margin-bottom:4px;">❌ 틀린 예시 (원본 OCR 텍스트)</label>
      <textarea id="pm-original" rows="2" style="border:1px solid #cbd5e1;border-radius:6px;padding:7px 10px;font-size:0.85rem;width:100%;resize:vertical;font-family:monospace;outline:none;box-sizing:border-box;"></textarea>
    </div>
    <div style="margin-bottom:12px;">
      <label style="font-size:0.82rem;color:#64748b;display:block;margin-bottom:4px;">✅ 올바른 표현 (교정된 텍스트)</label>
      <textarea id="pm-corrected" rows="2" style="border:1px solid #cbd5e1;border-radius:6px;padding:7px 10px;font-size:0.85rem;width:100%;resize:vertical;font-family:monospace;outline:none;box-sizing:border-box;"></textarea>
    </div>
    <div style="margin-bottom:18px;">
      <label style="font-size:0.82rem;color:#64748b;display:block;margin-bottom:4px;">메모 (선택)</label>
      <input id="pm-note" type="text" placeholder="예: 분수 분자 오인식, 백슬래시 누락 등" style="border:1px solid #cbd5e1;border-radius:6px;padding:7px 10px;font-size:0.88rem;width:100%;outline:none;box-sizing:border-box;">
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button onclick="closePatternModal()" style="padding:8px 18px;border:1px solid #e2e8f0;border-radius:6px;background:#fff;color:#64748b;font-size:0.88rem;cursor:pointer;">취소</button>
      <button onclick="submitPattern()" style="padding:8px 20px;border:none;border-radius:6px;background:#6d28d9;color:#fff;font-size:0.88rem;font-weight:600;cursor:pointer;">패턴 등록</button>
    </div>
  </div>
</div>

<!-- 토스트 -->
<div id="toast"></div>

<script>
(function () {
  'use strict';

  /* ══════════════════════════════════════════════
     초기화: 페이지 로드 시 /api/me 로 인증 확인
  ══════════════════════════════════════════════ */
  window.addEventListener('DOMContentLoaded', function () {
    // 폼 Enter 단축키
    document.getElementById('add-name').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') document.getElementById('add-email').focus();
    });
    document.getElementById('add-email').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') document.getElementById('add-cap').focus();
    });
    document.getElementById('add-cap').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') doAddUser();
    });

    checkAuth();
  });

  function checkAuth() {
    fetch('/api/me', { credentials: 'include' })
      .then(function (r) {
        if (r.status === 401 || r.status === 403) {
          window.location.href = '/';
          return null;
        }
        if (!r.ok) throw new Error('서버 오류 ' + r.status);
        return r.json();
      })
      .then(function (me) {
        if (!me) return;
        if (!me.authenticated || !me.is_admin) {
          window.location.href = '/';
          return;
        }
        // 인증 성공 — UI 표시
        var name = me.name || me.email || '관리자';
        document.getElementById('greeting').textContent = '안녕하세요, ' + name + '님';
        document.getElementById('loading-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'flex';

        loadUsers();
        loadCorrections();
        loadPatterns();
      })
      .catch(function (err) {
        showToast('인증 확인 실패: ' + (err.message || err), true);
        document.getElementById('loading-overlay').style.display = 'none';
      });
  }

  /* ══════════════════════════════════════════════
     로그아웃
  ══════════════════════════════════════════════ */
  window.doLogout = function () {
    window.location.href = '/auth/logout';
  };

  /* ══════════════════════════════════════════════
     사용자 추가
  ══════════════════════════════════════════════ */
  window.doAddUser = function () {
    var name  = document.getElementById('add-name').value.trim();
    var email = document.getElementById('add-email').value.trim();
    var cap   = parseFloat(document.getElementById('add-cap').value);

    if (!name)  { showToast('이름을 입력하세요', true); return; }
    if (!email) { showToast('이메일을 입력하세요', true); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showToast('올바른 이메일 형식이 아닙니다', true); return;
    }
    if (isNaN(cap) || cap < 0) cap = 2.0;

    var btn = document.getElementById('add-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner spinner-white"></span>추가 중...';

    apiFetch('/api/admin/users', {
      method: 'POST',
      body: JSON.stringify({ email: email, name: name, cap_usd: cap, role: document.getElementById('add-role').value || 'tier1' })
    })
      .then(function () {
        showToast(name + ' 님이 추가되었습니다');
        document.getElementById('add-name').value  = '';
        document.getElementById('add-email').value = '';
        document.getElementById('add-cap').value   = '2.0';
        loadUsers();
      })
      .catch(function (err) {
        showToast('추가 실패: ' + (err.message || err), true);
      })
      .finally(function () {
        btn.disabled = false;
        btn.textContent = '사용자 추가';
      });
  };

  /* ══════════════════════════════════════════════
     사용자 목록 로드 + 렌더
  ══════════════════════════════════════════════ */
  function loadUsers() {
    apiFetch('/api/admin/users')
      .then(function (list) { renderUsers(list); })
      .catch(function (err) {
        showToast('사용자 목록 로드 실패: ' + (err.message || err), true);
        document.getElementById('users-tbody').innerHTML =
          '<tr class="empty-row"><td colspan="8">로드 실패</td></tr>';
      });
  }

  var ROLE_LABELS = { tier1:'기본', tier2:'그림완성', tier3:'타이퍼', tier4:'해설', staff:'직원', admin:'관리자', user:'기본' };

  function renderUsers(list) {
    var tbody = document.getElementById('users-tbody');
    if (!list || list.length === 0) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="8">등록된 사용자가 없습니다</td></tr>';
      return;
    }

    tbody.innerHTML = list.map(function (u) {
      var active     = u.active !== false;
      var todayCost  = u.today_cost  || 0;
      var totalCost  = u.total_cost  || 0;
      var cap        = u.cap_usd     || 0;
      var emailSafe  = escAttr(u.email || '');
      var nameSafe   = escHtml(u.name  || '');
      var capId      = 'cap-cell-' + safeId(u.email);

      // 오늘 비용 색상
      var todayClass = '';
      if (cap > 0) {
        var ratio = todayCost / cap;
        if (ratio >= 1)         todayClass = 'cost-exceed';
        else if (ratio >= 0.8)  todayClass = 'cost-warn';
      }

      // 상태 뱃지
      var badgeHtml = active
        ? '<span class="status-badge badge-active">활성</span>'
        : '<span class="status-badge badge-inactive">비활성</span>';

      // 역할 셀
      var roleLabel = ROLE_LABELS[u.role] || u.role || '기본';
      var roleColor = { staff:'#dcfce7', admin:'#fef3c7', tier4:'#ede9fe', tier3:'#e0f2fe', tier2:'#f0fdf4' }[u.role] || '#f1f5f9';
      var roleSel = (u.role === 'admin') ? escHtml(roleLabel) :
        '<select style="border:1px solid #e2e8f0;border-radius:5px;padding:2px 6px;font-size:0.78rem;background:' + roleColor + ';"'
        + ' onchange="doPatch(\'' + emailSafe + '\',{action:\'role\',role:this.value})">'
        + ['tier1','tier2','tier3','tier4','staff'].map(function(r) {
            return '<option value="' + r + '"' + (u.role===r?' selected':'') + '>' + ROLE_LABELS[r] + '</option>';
          }).join('')
        + '</select>';

      // 버튼 그룹
      var btnToggle = active
        ? '<button class="btn-sm btn-warning" onclick="doPatch(\'' + emailSafe + '\',{action:\'deactivate\'})">비활성화</button>'
        : '<button class="btn-sm btn-success"  onclick="doPatch(\'' + emailSafe + '\',{action:\'activate\'})">활성화</button>';
      var btnDel = '<button class="btn-sm btn-danger" onclick="doDelete(\'' + emailSafe + '\',\'' + nameSafe.replace(/'/g,"&#39;") + '\')">삭제</button>';

      // 한도 셀 (클릭 시 인라인 편집)
      var capText = cap > 0 ? ('$' + cap.toFixed(2)) : '$0 (무제한)';
      var capCell = '<span class="cap-clickable" onclick="startCapEdit(\'' + emailSafe + '\',' + cap + ')">' + escHtml(capText) + '</span>';

      return '<tr class="' + (active ? '' : 'inactive') + '">'
        + '<td>' + nameSafe + '</td>'
        + '<td class="email-cell" title="클릭하면 복사" onclick="copyText(\'' + emailSafe + '\')">' + escHtml(u.email || '') + '</td>'
        + '<td id="' + capId + '">' + capCell + '</td>'
        + '<td class="' + todayClass + '">$' + todayCost.toFixed(2) + '</td>'
        + '<td>$' + totalCost.toFixed(2) + '</td>'
        + '<td>' + badgeHtml + '</td>'
        + '<td>' + roleSel + '</td>'
        + '<td><div class="actions">' + btnToggle + btnDel + '</div></td>'
        + '</tr>';
    }).join('');
  }

  /* ══════════════════════════════════════════════
     사용자 PATCH (활성화/비활성화)
  ══════════════════════════════════════════════ */
  window.doPatch = function (email, body) {
    apiFetch('/api/admin/users/' + encodeURIComponent(email), {
      method: 'PATCH',
      body: JSON.stringify(body)
    })
      .then(function () {
        var label = body.action === 'deactivate' ? '비활성화' : '활성화';
        showToast(email + ' ' + label + ' 완료');
        loadUsers();
      })
      .catch(function (err) { showToast('오류: ' + (err.message || err), true); });
  };

  /* ══════════════════════════════════════════════
     사용자 삭제
  ══════════════════════════════════════════════ */
  window.doDelete = function (email, name) {
    if (!confirm('"' + (name || email) + '" 사용자를 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')) return;
    apiFetch('/api/admin/users/' + encodeURIComponent(email), {
      method: 'PATCH',
      body: JSON.stringify({ action: 'delete' })
    })
      .then(function () {
        showToast(email + ' 삭제 완료');
        loadUsers();
      })
      .catch(function (err) { showToast('삭제 실패: ' + (err.message || err), true); });
  };

  /* ══════════════════════════════════════════════
     한도 인라인 편집
  ══════════════════════════════════════════════ */
  window.startCapEdit = function (email, currentCap) {
    var cellId = 'cap-cell-' + safeId(email);
    var cell   = document.getElementById(cellId);
    if (!cell) return;

    var inputId = 'cap-input-' + safeId(email);
    cell.innerHTML =
      '<div class="cap-edit-wrap">'
      + '<input type="number" id="' + inputId + '" value="' + currentCap + '" min="0" step="0.5">'
      + '<button class="btn-sm btn-primary" onclick="saveCapEdit(\'' + escAttr(email) + '\')">저장</button>'
      + '<button class="btn-sm btn-secondary" onclick="loadUsers()">취소</button>'
      + '</div>';

    var inp = document.getElementById(inputId);
    if (inp) { inp.focus(); inp.select(); }

    inp && inp.addEventListener('keydown', function (e) {
      if (e.key === 'Enter')  saveCapEdit(email);
      if (e.key === 'Escape') loadUsers();
    });
  };

  window.saveCapEdit = function (email) {
    var inp = document.getElementById('cap-input-' + safeId(email));
    if (!inp) return;
    var val = parseFloat(inp.value);
    if (isNaN(val) || val < 0) { showToast('올바른 금액을 입력하세요', true); return; }

    apiFetch('/api/admin/users/' + encodeURIComponent(email), {
      method: 'PATCH',
      body: JSON.stringify({ action: 'cap', cap_usd: val })
    })
      .then(function () {
        showToast(email + ' 한도 $' + val.toFixed(2) + '로 변경됨');
        loadUsers();
      })
      .catch(function (err) { showToast('한도 변경 실패: ' + (err.message || err), true); });
  };

  /* ══════════════════════════════════════════════
     수정 내역 로드 + 렌더
  ══════════════════════════════════════════════ */
  var _allCorrections = [];

  function loadCorrections() {
    var days = document.getElementById('filter-days').value || 30;
    apiFetch('/api/admin/corrections?days=' + days)
      .then(function (data) {
        _allCorrections = data.corrections || [];
        var summary = data.summary || {};
        var total = _allCorrections.length;
        document.getElementById('corrections-summary').textContent =
          '전체 ' + total + '건 · 되돌림 ' + (summary.reverted || 0) + '건';

        // 직원 필터 옵션 구성
        var empSet = {};
        _allCorrections.forEach(function (e) {
          var emp = e.employee || '(알 수 없음)';
          empSet[emp] = (empSet[emp] || 0) + 1;
        });
        var sel = document.getElementById('filter-emp');
        var prevVal = sel.value;
        sel.innerHTML = '<option value="">전체 직원 (' + total + '건)</option>';
        Object.keys(empSet).sort().forEach(function (emp) {
          var opt = document.createElement('option');
          opt.value = emp;
          opt.textContent = emp + ' (' + empSet[emp] + '건)';
          sel.appendChild(opt);
        });
        if (prevVal) sel.value = prevVal;

        // 직원별 통계 배지
        var statsEl = document.getElementById('emp-stats');
        statsEl.innerHTML = Object.keys(empSet).sort().map(function (emp) {
          return '<span style="background:#f1f5f9;border:1px solid #e2e8f0;border-radius:20px;padding:3px 12px;font-size:0.8rem;color:#1e293b;">'
            + escHtml(emp) + ' <strong>' + empSet[emp] + '</strong>건</span>';
        }).join('');

        renderCorrections();
      })
      .catch(function (err) {
        showToast('수정 로그 로드 실패: ' + (err.message || err), true);
        document.getElementById('corrections-tbody').innerHTML =
          '<tr class="empty-row"><td colspan="8">로드 실패</td></tr>';
      });
  }

  // 필터 이벤트
  ['filter-emp', 'filter-days', 'filter-overall'].forEach(function (id) {
    document.getElementById(id).addEventListener('change', function () {
      if (id === 'filter-days') { loadCorrections(); return; }
      renderCorrections();
    });
  });
  document.getElementById('filter-keyword').addEventListener('input', renderCorrections);

  function renderCorrections() {
    var tbody   = document.getElementById('corrections-tbody');
    var empVal  = document.getElementById('filter-emp').value;
    var keyword = document.getElementById('filter-keyword').value.trim().toLowerCase();
    var onlyOverall = document.getElementById('filter-overall').checked;

    var list = _allCorrections.filter(function (e) {
      if (empVal && (e.employee || '') !== empVal) return false;
      if (onlyOverall && String(e.problem_number) !== '전체') return false;
      if (keyword) {
        var haystack = [e.pdf_name, e.employee, e.correction_note,
                        e.problem_text, e.corrected_text,
                        String(e.problem_number)].join(' ').toLowerCase();
        if (haystack.indexOf(keyword) === -1) return false;
      }
      return true;
    });

    document.getElementById('filter-count').textContent =
      list.length !== _allCorrections.length ? list.length + '건 표시 중' : '';

    if (!list.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="8">해당 항목 없음</td></tr>';
      return;
    }

    tbody.innerHTML = list.map(function (e) {
      var ts       = (e.ts || '').replace('T', ' ').slice(0, 16);
      var rev      = e.status === 'reverted';
      var isGlobal = String(e.problem_number) === '전체';
      var rowBg    = isGlobal ? 'background:#faf5ff;' : '';
      var rowStyle = rev ? rowBg + 'opacity:0.5;' : rowBg;

      // 원본 OCR 텍스트 (접이식)
      var rawText = (e.problem_text || '').trim();
      var textCell;
      if (!rawText) {
        textCell = '<span style="color:#cbd5e1;">—</span>';
      } else if (rawText.length > 80) {
        var shortText = escHtml(rawText.slice(0, 80)) + '…';
        var fullText  = escHtml(rawText);
        textCell = '<span class="ocr-short">' + shortText + '</span>'
          + '<span class="ocr-full" style="display:none;">' + fullText + '</span>'
          + '<button onclick="toggleOcr(this)" style="margin-left:4px;font-size:0.72rem;color:#6366f1;background:none;border:none;cursor:pointer;padding:0;">더보기</button>';
      } else {
        textCell = '<span style="font-family:monospace;font-size:0.78rem;white-space:pre-wrap;">' + escHtml(rawText) + '</span>';
      }

      // 수정 메모 + 수정 내용
      var noteHtml = '';
      if (e.correction_note) {
        noteHtml += '<div style="color:#dc2626;font-size:0.82rem;">📝 ' + escHtml(e.correction_note) + '</div>';
      }
      if (e.corrected_text) {
        noteHtml += '<div style="font-family:monospace;font-size:0.78rem;color:#0369a1;margin-top:3px;background:#f0f9ff;padding:3px 6px;border-radius:4px;">'
          + escHtml(e.corrected_text) + '</div>';
      }
      if (!noteHtml) noteHtml = '<span style="color:#cbd5e1;">—</span>';

      // 문제번호
      var probNum = isGlobal
        ? '<span style="background:#a78bfa;color:#fff;border-radius:4px;padding:1px 6px;font-size:0.75rem;">전체</span>'
        : escHtml(String(e.problem_number || '')) + '번';

      return '<tr style="' + rowStyle + '">'
        + '<td style="white-space:nowrap;font-size:0.78rem;color:#64748b;">' + escHtml(ts) + '</td>'
        + '<td style="font-weight:600;font-size:0.82rem;">' + escHtml(e.employee || '') + '</td>'
        + '<td style="font-size:0.78rem;word-break:break-all;">' + escHtml((e.pdf_name || '').replace(/\.[^.]+$/, '')) + '</td>'
        + '<td style="text-align:center;">' + probNum + '</td>'
        + '<td style="max-width:240px;">' + textCell + '</td>'
        + '<td style="max-width:200px;">' + noteHtml + '</td>'
        + '<td>' + (rev
            ? '<span style="color:#9ca3af;font-size:0.78rem;">되돌림</span>'
            : '<span style="color:#16a34a;font-size:0.78rem;">적용</span>') + '</td>'
        + '<td style="white-space:nowrap;vertical-align:top;padding-top:8px;">'
        + (rev ? '' : '<button onclick="doRevert(\'' + escAttr(String(e.id)) + '\')" style="font-size:0.72rem;padding:2px 7px;background:#fee2e2;color:#dc2626;border:none;border-radius:4px;cursor:pointer;display:block;margin-bottom:4px;">되돌리기</button>')
        + (!rev ? '<button onclick="openPatternModal(\'' + escAttr(String(e.id)) + '\',\'' + escAttr(e.problem_text||'') + '\',\'' + escAttr(e.corrected_text||'') + '\',\'' + escAttr(e.correction_note||'') + '\')" style="font-size:0.72rem;padding:2px 7px;background:#ede9fe;color:#6d28d9;border:none;border-radius:4px;cursor:pointer;display:block;">패턴 등록</button>' : '')
        + '</td>'
        + '</tr>';
    }).join('');
  }

  window.toggleOcr = function (btn) {
    var td     = btn.closest('td');
    var short  = td.querySelector('.ocr-short');
    var full   = td.querySelector('.ocr-full');
    var isOpen = full.style.display !== 'none';
    short.style.display = isOpen ? '' : 'none';
    full.style.display  = isOpen ? 'none' : '';
    btn.textContent = isOpen ? '더보기' : '접기';
  };

  window.doRevert = function (cid) {
    if (!confirm('이 수정을 되돌릴까요?')) return;
    apiFetch('/api/admin/corrections/' + encodeURIComponent(cid) + '/revert', {
      method: 'PATCH',
      body: JSON.stringify({})
    })
      .then(function () { showToast('되돌림 완료'); loadCorrections(); })
      .catch(function (err) { showToast('오류: ' + (err.message || err), true); });
  };

  /* ══════════════════════════════════════════════
     이메일 클립보드 복사
  ══════════════════════════════════════════════ */
  window.copyText = function (text) {
    navigator.clipboard.writeText(text)
      .then(function () { showToast('복사됨: ' + text); })
      .catch(function () { showToast('복사 실패', true); });
  };

  /* ══════════════════════════════════════════════
     fetch 공통 헬퍼 (쿠키 세션 인증)
  ══════════════════════════════════════════════ */
  function apiFetch(url, options) {
    var opts = Object.assign({ credentials: 'include', headers: {} }, options || {});
    if (opts.body) {
      opts.headers['Content-Type'] = 'application/json';
    }
    return fetch(url, opts).then(function (r) {
      if (r.status === 401 || r.status === 403) {
        window.location.href = '/';
        return Promise.reject(new Error('권한 없음'));
      }
      if (!r.ok) {
        return r.text().then(function (msg) {
          var err = new Error(msg || r.statusText);
          err.status = r.status;
          return Promise.reject(err);
        });
      }
      var ct = r.headers.get('content-type') || '';
      if (ct.indexOf('application/json') !== -1) return r.json();
      return r.text();
    });
  }

  /* ══════════════════════════════════════════════
     토스트
  ══════════════════════════════════════════════ */
  var toastTimer = null;
  function showToast(msg, isError) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.toggle('error', !!isError);
    el.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { el.classList.remove('show'); }, 2400);
  }

  /* ══════════════════════════════════════════════
     유틸
  ══════════════════════════════════════════════ */
  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // onclick 속성 내 작은따옴표 이스케이프
  function escAttr(s) {
    return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
  }

  // CSS id 에 사용할 안전한 문자열
  function safeId(s) {
    return String(s).replace(/[^a-zA-Z0-9]/g, '_');
  }

  /* ══════════════════════════════════════════════
     프롬프트 패턴 관리
  ══════════════════════════════════════════════ */
  function loadPatterns() {
    apiFetch('/api/admin/patterns')
      .then(function (list) { renderPatterns(list); })
      .catch(function (err) { showToast('패턴 로드 실패: ' + (err.message || err), true); });
  }

  function renderPatterns(list) {
    var el = document.getElementById('patterns-list');
    if (!list || !list.length) {
      el.innerHTML = '<div style="color:#94a3b8;font-size:0.85rem;padding:12px 0;">등록된 패턴 없음</div>';
      return;
    }
    el.innerHTML = list.map(function (p) {
      var active   = p.active !== false;
      var scopeStr = p.scope === 'global' ? '전체공통' : (p.scope_value || p.scope);
      var badgeCol = active ? '#6d28d9' : '#94a3b8';
      return '<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #f1f5f9;">'
        + '<span style="background:' + badgeCol + ';color:#fff;border-radius:4px;padding:2px 8px;font-size:0.72rem;white-space:nowrap;flex-shrink:0;">' + escHtml(scopeStr) + '</span>'
        + '<div style="flex:1;min-width:0;">'
        + (p.original_text ? '<div style="font-family:monospace;font-size:0.78rem;color:#dc2626;">❌ ' + escHtml(p.original_text) + '</div>' : '')
        + (p.corrected_text ? '<div style="font-family:monospace;font-size:0.78rem;color:#0369a1;">✅ ' + escHtml(p.corrected_text) + '</div>' : '')
        + (p.note ? '<div style="font-size:0.75rem;color:#64748b;margin-top:2px;">' + escHtml(p.note) + '</div>' : '')
        + '</div>'
        + '<div style="display:flex;gap:6px;flex-shrink:0;">'
        + '<button onclick="doTogglePattern(\'' + escAttr(p.id) + '\',' + (!active) + ')" style="font-size:0.72rem;padding:2px 8px;border:1px solid #e2e8f0;border-radius:4px;background:#fff;cursor:pointer;">'
        + (active ? '비활성화' : '활성화') + '</button>'
        + '<button onclick="doDeletePattern(\'' + escAttr(p.id) + '\')" style="font-size:0.72rem;padding:2px 8px;border:none;border-radius:4px;background:#fee2e2;color:#dc2626;cursor:pointer;">삭제</button>'
        + '</div>'
        + '</div>';
    }).join('');
  }

  window.doTogglePattern = function (pid, active) {
    apiFetch('/api/admin/patterns/' + encodeURIComponent(pid), {
      method: 'PATCH',
      body: JSON.stringify({ active: active }),
    }).then(function () {
      showToast(active ? '패턴 활성화됨' : '패턴 비활성화됨');
      loadPatterns();
    }).catch(function (err) { showToast('오류: ' + (err.message || err), true); });
  };

  window.doDeletePattern = function (pid) {
    if (!confirm('이 패턴을 삭제할까요?')) return;
    apiFetch('/api/admin/patterns/' + encodeURIComponent(pid), { method: 'DELETE' })
      .then(function () { showToast('패턴 삭제됨', false); loadPatterns(); })
      .catch(function (err) { showToast('삭제 실패: ' + (err.message || err), true); });
  };

  /* 모달 */
  window.openPatternModal = function (cid, problemText, correctedText, note) {
    document.getElementById('pm-cid').value       = cid;
    document.getElementById('pm-original').value  = problemText || '';
    document.getElementById('pm-corrected').value = correctedText || '';
    document.getElementById('pm-note').value      = note || '';
    document.getElementById('pm-scope').value     = 'global';
    document.getElementById('pm-scope-val-wrap').style.display = 'none';
    document.getElementById('pattern-modal').style.display = 'flex';
  };

  window.closePatternModal = function () {
    document.getElementById('pattern-modal').style.display = 'none';
  };

  /* 기본 패턴 일괄 등록 (멱등) */
  window.seedDefaultPatterns = function () {
    apiFetch('/api/admin/patterns/seed-defaults', { method: 'POST' })
      .then(function (data) {
        var n = (data && data.added != null) ? data.added : 0;
        showToast(n > 0 ? (n + '개 기본 패턴 등록됨') : '이미 모두 등록되어 있습니다');
        loadPatterns();
      })
      .catch(function (err) { showToast('기본 패턴 등록 실패: ' + (err.message || err), true); });
  };

  document.getElementById('pm-scope').addEventListener('change', function () {
    var v = this.value;
    var wrap  = document.getElementById('pm-scope-val-wrap');
    var label = document.getElementById('pm-scope-val-label');
    if (v === 'global') {
      wrap.style.display = 'none';
    } else {
      wrap.style.display = 'block';
      label.textContent  = v === 'school' ? '학교명 (예: 경신여고)' : '과목 ID (예: 공수1)';
    }
  });

  window.submitPattern = function () {
    var cid        = document.getElementById('pm-cid').value;
    var scope      = document.getElementById('pm-scope').value;
    var scopeVal   = document.getElementById('pm-scope-val').value.trim();
    var original   = document.getElementById('pm-original').value.trim();
    var corrected  = document.getElementById('pm-corrected').value.trim();
    var note       = document.getElementById('pm-note').value.trim();

    if (scope !== 'global' && !scopeVal) {
      showToast('범위 값을 입력하세요.', true); return;
    }

    apiFetch('/api/admin/corrections/' + encodeURIComponent(cid) + '/approve-pattern', {
      method: 'POST',
      body: JSON.stringify({
        scope: scope, scope_value: scopeVal,
        original_text: original, corrected_text: corrected, note: note,
      }),
    }).then(function () {
      showToast('패턴 등록 완료 — 다음 변환부터 Claude에 주입됩니다');
      closePatternModal();
      loadPatterns();
    }).catch(function (err) { showToast('등록 실패: ' + (err.message || err), true); });
  };

})();
</script>
</body>
</html>
