<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AKP 매트릭스</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, -apple-system, 'Noto Sans KR', sans-serif;
  background: #f8f9fa;
  color: #212529;
  min-height: 100vh;
}

#toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}
.toast {
  background: #1e293b;
  color: #f1f5f9;
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 0.88rem;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.25s, transform 0.25s;
  pointer-events: none;
  max-width: 320px;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.toast-ok   { border-left: 4px solid #28a745; }
.toast.toast-err  { border-left: 4px solid #dc3545; }
.toast.toast-warn { border-left: 4px solid #fd7e14; }

#topbar {
  background: #fff;
  border-bottom: 1px solid #dee2e6;
  padding: 0 20px;
  height: 52px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 100;
}
#topbar h1 {
  font-size: 1rem;
  font-weight: 700;
  color: #343a40;
  white-space: nowrap;
  margin-right: 6px;
}
.period-select {
  border: 1px solid #dee2e6;
  border-radius: 6px;
  padding: 5px 8px;
  font-size: 0.85rem;
  color: #495057;
  background: #fff;
  cursor: pointer;
  outline: none;
  transition: border-color 0.15s;
}
.period-select:focus { border-color: #0d6efd; }
#topbar-spacer { flex: 1; }
#user-name { font-size: 0.83rem; color: #6c757d; white-space: nowrap; }
#admin-link { font-size: 0.83rem; color: #6b7280; text-decoration: none; display: none; }
#admin-link:hover { text-decoration: underline; }
#logout-link { font-size: 0.83rem; color: #6b7280; text-decoration: none; white-space: nowrap; }
#logout-link:hover { color: #343a40; text-decoration: underline; }

#subject-bar {
  background: #fff;
  border-bottom: 1px solid #dee2e6;
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 2px;
  overflow-x: auto;
  scrollbar-width: none;
}
#subject-bar::-webkit-scrollbar { display: none; }
.subj-tab {
  padding: 12px 18px;
  font-size: 0.88rem;
  font-weight: 500;
  color: #6c757d;
  border: none;
  background: transparent;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  white-space: nowrap;
  transition: color 0.15s, border-color 0.15s;
  margin-bottom: -1px;
}
.subj-tab:hover { color: #343a40; }
.subj-tab.active { color: #0d6efd; border-bottom-color: #0d6efd; font-weight: 600; }
#add-subject-btn {
  padding: 8px 14px;
  font-size: 0.83rem;
  color: #6c757d;
  border: 1px dashed #ced4da;
  border-radius: 6px;
  background: transparent;
  cursor: pointer;
  white-space: nowrap;
  margin-left: 6px;
  transition: all 0.15s;
}
#add-subject-btn:hover { color: #0d6efd; border-color: #0d6efd; background: #f0f7ff; }

#main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px 20px;
}

#add-school-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}
#add-school-btn {
  padding: 7px 16px;
  font-size: 0.85rem;
  color: #0d6efd;
  border: 1px dashed #0d6efd;
  border-radius: 6px;
  background: transparent;
  cursor: pointer;
  transition: all 0.15s;
}
#add-school-btn:hover { background: #f0f7ff; }
#school-input-wrap { display: none; align-items: center; gap: 8px; }
#school-input-wrap.show { display: flex; }
#new-school-input {
  border: 1.5px solid #0d6efd;
  border-radius: 6px;
  padding: 6px 12px;
  font-size: 0.88rem;
  outline: none;
  width: 180px;
}
.btn-sm { padding: 6px 14px; font-size: 0.83rem; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; transition: background 0.15s; }
.btn-primary { background: #0d6efd; color: #fff; }
.btn-primary:hover { background: #0b5ed7; }
.btn-secondary { background: #6c757d; color: #fff; }
.btn-secondary:hover { background: #5a6268; }

#matrix-wrap {
  overflow-x: auto;
  border-radius: 10px;
  border: 1px solid #dee2e6;
  background: #fff;
}
#matrix-table {
  width: 100%;
  border-collapse: collapse;
  min-width: 320px;
}
#matrix-table thead th {
  background: #f1f3f5;
  color: #495057;
  font-size: 0.82rem;
  font-weight: 600;
  padding: 10px 14px;
  border-bottom: 2px solid #dee2e6;
  white-space: nowrap;
  text-align: left;
}
#matrix-table thead th:first-child { width: 140px; min-width: 120px; }
#matrix-table thead th:nth-child(2) { min-width: 260px; }

#matrix-table tbody td {
  padding: 10px 14px;
  border-bottom: 1px solid #e9ecef;
  vertical-align: middle;
  font-size: 0.88rem;
}
#matrix-table tbody tr:last-child td { border-bottom: none; }

.summary-row { cursor: default; }
.summary-row:hover { background: #f1f8ff; }

.school-cell {
  font-weight: 600;
  color: #343a40;
  display: flex;
  align-items: center;
  gap: 8px;
}
.del-school-btn {
  background: none;
  border: none;
  color: #adb5bd;
  cursor: pointer;
  font-size: 0.85rem;
  padding: 2px 4px;
  border-radius: 4px;
  line-height: 1;
  display: none;
}
.summary-row:hover .del-school-btn { display: inline; }
.del-school-btn:hover { color: #dc3545; background: #fff0f0; }

.upload-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 14px;
  font-size: 0.82rem;
  font-weight: 500;
  border: 1.5px dashed #ced4da;
  border-radius: 8px;
  background: #fff;
  color: #495057;
  cursor: pointer;
  transition: all 0.15s;
}
.upload-btn:hover { border-color: #0d6efd; color: #0d6efd; background: #f0f7ff; }
.upload-btn.drag-over { border-color: #0d6efd; background: #e8f0fe; }

.pipe-summary {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  user-select: none;
}
.pipe-dots { display: flex; align-items: center; gap: 5px; }
.pipe-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
}
.pipe-dot-none     { background: #dee2e6; }
.pipe-dot-progress { background: #fd7e14; }
.pipe-dot-done     { background: #198754; }
.pipe-dot-error    { background: #dc3545; }
.pipe-dot-reviewed { background: #6f42c1; }

.pipe-status-text {
  font-size: 0.82rem;
  color: #6c757d;
  display: flex;
  align-items: center;
  gap: 6px;
}
.pipe-toggle-icon {
  margin-left: auto;
  font-size: 0.75rem;
  color: #adb5bd;
  flex-shrink: 0;
}

@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  width: 13px; height: 13px;
  border: 2px solid #e9ecef;
  border-top-color: #fd7e14;
  border-radius: 50%;
  display: inline-block;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
}

.pipeline-expand-row { display: none; }
.pipeline-expand-row.open { display: table-row; }
.pipeline-expand-td {
  padding: 0 !important;
  border-bottom: 2px solid #dee2e6 !important;
  background: #f8f9fa;
}

.stage-cards {
  display: flex;
  gap: 10px;
  padding: 14px 16px;
  overflow-x: auto;
  scrollbar-width: thin;
}
.stage-cards::-webkit-scrollbar { height: 4px; }
.stage-cards::-webkit-scrollbar-thumb { background: #ced4da; border-radius: 2px; }

.stage-card {
  min-width: 150px;
  flex-shrink: 0;
  background: #fff;
  border: 1px solid #dee2e6;
  border-radius: 8px;
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.stage-card.s-done    { border-color: #198754; }
.stage-card.s-progress { border-color: #fd7e14; }
.stage-card.s-error   { border-color: #dc3545; }
.stage-card.s-reviewed { border-color: #6f42c1; }

.stage-num {
  font-size: 0.70rem;
  font-weight: 700;
  color: #adb5bd;
  letter-spacing: 0.04em;
}
.stage-name {
  font-size: 0.83rem;
  font-weight: 600;
  color: #343a40;
}
.stage-status-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 100px;
  font-size: 0.75rem;
  font-weight: 600;
  white-space: nowrap;
  align-self: flex-start;
}
.sb-none     { background: #f1f3f5; color: #6c757d; }
.sb-done     { background: #d1fae5; color: #065f46; }
.sb-reviewed { background: #ede9fe; color: #5b21b6; }
.sb-progress { background: #fff3cd; color: #856404; }
.sb-error    { background: #fee2e2; color: #991b1b; }

.stage-actions {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-top: auto;
}
.s-btn {
  padding: 4px 10px;
  font-size: 0.78rem;
  border-radius: 5px;
  border: 1px solid transparent;
  cursor: pointer;
  font-weight: 500;
  text-decoration: none;
  display: inline-block;
  transition: all 0.15s;
  white-space: nowrap;
  text-align: center;
}
.s-upload { background: #fff; border-color: #ced4da; color: #495057; }
.s-upload:hover { border-color: #0d6efd; color: #0d6efd; }
.s-dl    { background: #198754; color: #fff; }
.s-dl:hover { background: #157347; }
.s-review { background: #2563eb; color: #fff; }
.s-review:hover { background: #1d4ed8; }
.s-del   { background: #fff; border-color: #f1aeb5; color: #dc3545; }
.s-del:hover { background: #fee2e2; }
.s-auto  { background: #fff; border-color: #0891b2; color: #0891b2; }
.s-auto:hover { background: #ecfeff; }
.s-auto:disabled { opacity: .55; cursor: not-allowed; }
.stage-card.s-auto-done { border-color: #0891b2; }
.s-inprog { background: #fff3cd; color: #856404; border: none; cursor: default; font-size: 0.75rem; }

.hidden-input { display: none; }

#matrix-empty {
  text-align: center;
  padding: 48px 20px;
  color: #adb5bd;
  font-size: 0.9rem;
}

@media (max-width: 600px) {
  #topbar { gap: 8px; padding: 0 12px; }
  #topbar h1 { font-size: 0.9rem; }
  .period-select { font-size: 0.78rem; padding: 4px 6px; }
  #main { padding: 16px 12px; }
}
</style>
</head>
<body>

<div id="toast-container"></div>

<input type="file" id="global-file-input" class="hidden-input" accept=".pdf,application/pdf">
<input type="file" id="stage-file-input" class="hidden-input">

<div id="topbar">
  <h1>AKP 변환기</h1>
  <select id="sel-year" class="period-select"></select>
  <select id="sel-round" class="period-select">
    <option value="a">1차 (a)</option>
    <option value="b">2차 (b)</option>
  </select>
  <div id="topbar-spacer"></div>
  <span id="user-name"></span>
  <a href="/admin" id="admin-link">관리자</a>
  <a href="/auth/logout" id="logout-link">로그아웃</a>
</div>

<div id="subject-bar">
  <button id="add-subject-btn">+ 과목 추가</button>
</div>

<div id="subject-meta-bar" style="background:#f8f9fa;border-bottom:1px solid #dee2e6;padding:6px 20px;display:flex;align-items:center;gap:10px;font-size:0.83rem;color:#495057;">
  <span id="subj-meta-name" style="font-weight:600;color:#343a40;"></span>
  <span style="color:#ced4da;">|</span>
  <label style="display:flex;align-items:center;gap:4px;">
    학년
    <select id="subj-grade-sel" class="period-select">
      <option value="">-</option>
      <option value="1">1학년</option>
      <option value="2">2학년</option>
      <option value="3">3학년</option>
    </select>
  </label>
  <label style="display:flex;align-items:center;gap:4px;">
    학기
    <select id="subj-sem-sel" class="period-select">
      <option value="">-</option>
      <option value="1">1학기</option>
      <option value="2">2학기</option>
    </select>
  </label>
  <span id="subj-meta-hint" style="color:#adb5bd;font-size:0.78rem;">← 이 과목의 학년·학기 설정 (과목마다 다르게 설정 가능)</span>
</div>

<div id="main">
  <div id="add-school-row">
    <button id="add-school-btn">+ 학교 추가</button>
    <div id="school-input-wrap">
      <input type="text" id="new-school-input" placeholder="학교명 입력 후 Enter">
      <button class="btn-sm btn-primary" id="school-confirm-btn">추가</button>
      <button class="btn-sm btn-secondary" id="school-cancel-btn">취소</button>
    </div>
  </div>

  <div id="matrix-wrap">
    <table id="matrix-table">
      <thead>
        <tr>
          <th>학교명</th>
          <th>파이프라인</th>
        </tr>
      </thead>
      <tbody id="matrix-tbody">
        <tr>
          <td colspan="2">
            <div id="matrix-empty">학교를 추가해 변환을 시작하세요.</div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<script>
"use strict";

const $ = id => document.getElementById(id);

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type = 'ok') {
  const container = $('toast-container');
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  container.appendChild(el);
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')));
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 300);
  }, 3200);
}

async function apiFetch(url, opts = {}) {
  const res = await fetch(url, { credentials: 'include', ...opts });
  if (res.status === 401 || res.status === 307) {
    window.location.href = '/auth/login';
    throw new Error('unauthenticated');
  }
  return res;
}

let gConfig = { subjects: [], schools: [] };
let gRegistry = {};
let gCurrentSubject = '';
const gActiveSse = {};
const gExpandedRows = new Set();

const STAGES = [
  { id: 'pdf',         name: 'PDF',        step: 1, manual: false },
  { id: 'hwpx_draft',  name: 'HWPX 검수전', step: 2, manual: false },
  { id: 'hwpx_review', name: 'HWPX 검수완', step: 3, manual: false },
  { id: 'hangeul',     name: '한글완성본',   step: 4, manual: true  },
  { id: 'typer',       name: '타이퍼 양식',  step: 5, manual: true  },
  { id: 'solution',    name: '해설',         step: 6, manual: true  },
];

const PERIOD_KEYS = ['sel-year', 'sel-round'];

function initYearSelect() {
  const sel = $('sel-year');
  const curY = new Date().getFullYear();
  for (let y = 2020; y <= 2030; y++) {
    const opt = document.createElement('option');
    opt.value = y;
    opt.textContent = `${y}년`;
    sel.appendChild(opt);
  }
  sel.value = String(curY);
}

function loadPeriodFromStorage() {
  const saved = JSON.parse(localStorage.getItem('akp_matrix_period') || 'null');
  if (!saved) return;
  PERIOD_KEYS.forEach(id => {
    const el = $(id);
    if (el && saved[id] !== undefined) el.value = String(saved[id]);
  });
}

function savePeriodToStorage() {
  const obj = {};
  PERIOD_KEYS.forEach(id => { obj[id] = $(id).value; });
  localStorage.setItem('akp_matrix_period', JSON.stringify(obj));
}

function getPeriod() {
  return { year: $('sel-year').value, round: $('sel-round').value };
}

function getSubjectMeta(subjectId) {
  const subj = gConfig.subjects.find(s => s.id === subjectId) || {};
  return { grade: subj.grade || '', sem: subj.sem || '' };
}

function buildRegistryKey(school, subjectId) {
  const p = getPeriod();
  const m = getSubjectMeta(subjectId);
  return `${p.year}_${m.grade}_${m.sem}_${p.round}_${subjectId}_${school}`;
}

function keyToSchool(key) {
  return key.split('_').slice(5).join('_');
}

function renderSubjectMeta() {
  const subj = gConfig.subjects.find(s => s.id === gCurrentSubject);
  if (!subj) return;
  $('subj-meta-name').textContent = subj.name || subj.id;
  $('subj-grade-sel').value = subj.grade || '';
  $('subj-sem-sel').value   = subj.sem   || '';
}

async function saveSubjectMeta(grade, sem) {
  try {
    const res = await apiFetch(`/api/config/subjects/${encodeURIComponent(gCurrentSubject)}`, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ grade, sem }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const updated = await res.json();
    const subj = gConfig.subjects.find(s => s.id === gCurrentSubject);
    if (subj) { subj.grade = updated.grade; subj.sem = updated.sem; }
    renderMatrix();
  } catch(e) {
    showToast('학년/학기 저장 실패: ' + e.message, 'err');
  }
}

$('subj-grade-sel').addEventListener('change', () =>
  saveSubjectMeta($('subj-grade-sel').value, $('subj-sem-sel').value));
$('subj-sem-sel').addEventListener('change', () =>
  saveSubjectMeta($('subj-grade-sel').value, $('subj-sem-sel').value));

PERIOD_KEYS.forEach(id => {
  const el = $(id);
  if (el) el.addEventListener('change', () => { savePeriodToStorage(); renderMatrix(); });
});

async function loadConfig() {
  try {
    const res = await apiFetch('/api/config');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    gConfig = await res.json();
  } catch(e) {
    if (e.message === 'unauthenticated') return;
    showToast('설정 로드 실패: ' + e.message, 'err');
  }
}

async function addSchool(name) {
  try {
    const res = await apiFetch('/api/config/schools', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ name }),
    });
    if (!res.ok) {
      const d = await res.json().catch(() => ({}));
      throw new Error(d.detail || `HTTP ${res.status}`);
    }
    await loadConfig();
    renderSubjectTabs();
    renderMatrix();
    showToast(`"${name}" 추가됨`, 'ok');
  } catch(e) {
    if (e.message === 'unauthenticated') return;
    showToast('학교 추가 실패: ' + e.message, 'err');
  }
}

async function deleteSchool(name) {
  if (!confirm(`"${name}" 학교를 삭제할까요?\n이 학교의 변환 기록은 유지됩니다.`)) return;
  try {
    const res = await apiFetch(`/api/config/schools/${encodeURIComponent(name)}`, { method: 'DELETE' });
    if (!res.ok) {
      const d = await res.json().catch(() => ({}));
      throw new Error(d.detail || `HTTP ${res.status}`);
    }
    await loadConfig();
    renderSubjectTabs();
    renderMatrix();
    showToast(`"${name}" 삭제됨`, 'warn');
  } catch(e) {
    if (e.message === 'unauthenticated') return;
    showToast('학교 삭제 실패: ' + e.message, 'err');
  }
}

async function addSubject(id, name) {
  try {
    const res = await apiFetch('/api/config/subjects', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ id, name }),
    });
    if (!res.ok) {
      const d = await res.json().catch(() => ({}));
      throw new Error(d.detail || `HTTP ${res.status}`);
    }
    await loadConfig();
    renderSubjectTabs();
    renderMatrix();
    showToast(`"${name}" 과목 추가됨`, 'ok');
  } catch(e) {
    if (e.message === 'unauthenticated') return;
    showToast('과목 추가 실패: ' + e.message, 'err');
  }
}

async function loadRegistry() {
  try {
    const res = await apiFetch('/api/registry');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    gRegistry = await res.json();
  } catch(e) {
    if (e.message === 'unauthenticated') return;
    console.warn('registry 로드 실패:', e);
  }
}

async function registerJob(registryKey, jobId, subjectId, school) {
  try {
    const res = await apiFetch('/api/registry/register', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        registry_key: registryKey, job_id: jobId, subject: subjectId, school,
        pdf_name: gRegistry[registryKey]?.pdf_name || '',
      }),
    });
    if (!res.ok) {
      const d = await res.json().catch(() => ({}));
      console.warn('registry 등록 실패:', d.detail);
    } else {
      gRegistry[registryKey] = await res.json();
    }
  } catch(e) {
    if (e.message !== 'unauthenticated') console.warn('registry 등록 오류:', e);
  }
}

function renderSubjectTabs() {
  const bar = $('subject-bar');
  Array.from(bar.querySelectorAll('.subj-tab')).forEach(el => el.remove());
  const btn = $('add-subject-btn');
  gConfig.subjects.forEach(subj => {
    const tab = document.createElement('button');
    tab.className = 'subj-tab' + (subj.id === gCurrentSubject ? ' active' : '');
    tab.dataset.subjId = subj.id;
    tab.textContent = subj.id;
    tab.title = subj.name;
    tab.addEventListener('click', () => {
      gCurrentSubject = subj.id;
      renderSubjectTabs();
      renderMatrix();
    });
    bar.insertBefore(tab, btn);
  });
  if (gConfig.subjects.length && !gConfig.subjects.find(s => s.id === gCurrentSubject)) {
    gCurrentSubject = gConfig.subjects[0].id;
    renderSubjectTabs();
    return;
  }
  renderSubjectMeta();
}

function stageColorClass(stageId, entry) {
  if (!entry) return 'pipe-dot-none';
  if (stageId === 'pdf') return entry ? 'pipe-dot-done' : 'pipe-dot-none';
  if (stageId === 'hwpx_draft') {
    if (entry.status === 'converting') return 'pipe-dot-progress';
    if (entry.status === 'done') return 'pipe-dot-done';
    if (entry.status === 'error') return 'pipe-dot-error';
    return 'pipe-dot-none';
  }
  if (stageId === 'hwpx_review') {
    if (!entry || entry.status !== 'done') return 'pipe-dot-none';
    if (entry.review_status === 'completed') return 'pipe-dot-reviewed';
    return 'pipe-dot-done';
  }
  const s = entry.stages?.[stageId];
  if (!s) return 'pipe-dot-none';
  return 'pipe-dot-done';
}

function renderPipeSummary(key, entry) {
  const dots = STAGES.map(st =>
    `<span class="pipe-dot ${stageColorClass(st.id, entry)}" title="${escHtml(st.name)}"></span>`
  ).join('');

  let statusText = '';
  if (entry) {
    if (entry.status === 'converting') {
      statusText = `<span class="spinner"></span> 변환 중`;
    } else if (entry.status === 'done') {
      if (entry.review_status === 'completed') statusText = '검수완료';
      else statusText = '변환완료';
    } else if (entry.status === 'error') {
      statusText = '오류';
    }
  }

  const school = keyToSchool(key);
  if (!entry) {
    return `<button class="upload-btn" data-key="${escHtml(key)}" data-school="${escHtml(school)}">📄 PDF 업로드</button>`;
  }

  return `<div class="pipe-summary" data-key="${escHtml(key)}">
    <div class="pipe-dots">${dots}</div>
    <div class="pipe-status-text">${statusText}</div>
    <span class="pipe-toggle-icon">${gExpandedRows.has(key) ? '▲' : '▼'}</span>
  </div>`;
}

function renderStageCard(key, entry, stage) {
  const { id, name, step, manual } = stage;
  let cardClass = 'stage-card';
  let badgeHtml = '';
  let actionsHtml = '';

  if (id === 'pdf') {
    const hasPdf = !!entry;
    if (hasPdf) {
      cardClass += ' s-done';
      const pdfName = entry.pdf_name || '';
      const label   = pdfName ? pdfName : '있음';
      const short   = label.length > 18 ? label.slice(0, 16) + '…' : label;
      badgeHtml = `<span class="stage-status-badge sb-done" title="${escHtml(label)}">${escHtml(short)}</span>`;
      actionsHtml = `<button class="s-btn s-upload" data-action="pdf-upload" data-key="${escHtml(key)}">재업로드</button>`;
    } else {
      badgeHtml = `<span class="stage-status-badge sb-none">없음</span>`;
      actionsHtml = `<button class="s-btn s-upload" data-action="pdf-upload" data-key="${escHtml(key)}">PDF 업로드</button>`;
    }
  } else if (id === 'hwpx_draft') {
    if (!entry || entry.status === 'error') {
      badgeHtml = `<span class="stage-status-badge sb-${entry?.status === 'error' ? 'error' : 'none'}">${entry?.status === 'error' ? '오류' : '없음'}</span>`;
    } else if (entry.status === 'converting') {
      cardClass += ' s-progress';
      badgeHtml = `<span class="stage-status-badge sb-progress"><span class="spinner"></span> 변환중</span>`;
      actionsHtml = `<span class="s-btn s-inprog">진행중...</span>`;
    } else if (entry.status === 'done') {
      cardClass += ' s-done';
      badgeHtml = `<span class="stage-status-badge sb-done">완료</span>`;
      actionsHtml = `<a class="s-btn s-dl" href="/download/${encodeURIComponent(entry.job_id)}" target="_blank">다운로드</a>
        <button class="s-btn s-del" data-action="delete-job" data-key="${escHtml(key)}" data-job-id="${escHtml(entry.job_id)}">삭제</button>`;
    }
  } else if (id === 'hwpx_review') {
    if (!entry || entry.status !== 'done') {
      badgeHtml = `<span class="stage-status-badge sb-none">없음</span>`;
    } else if (entry.review_status === 'completed') {
      cardClass += ' s-reviewed';
      badgeHtml = `<span class="stage-status-badge sb-reviewed">완료</span>`;
      actionsHtml = `<a class="s-btn s-review" href="/review/${encodeURIComponent(entry.job_id)}" target="_blank">검수보기</a>
        <a class="s-btn s-dl" href="/download/${encodeURIComponent(entry.job_id)}_reviewed" target="_blank">다운로드</a>`;
    } else {
      badgeHtml = `<span class="stage-status-badge sb-done">대기중</span>`;
      actionsHtml = `<a class="s-btn s-review" href="/review/${encodeURIComponent(entry.job_id)}" target="_blank">검수하기</a>`;
    }
  } else if (manual) {
    const stageData = entry?.stages?.[id];
    if (stageData) {
      cardClass += stageData.auto ? ' s-auto-done' : ' s-done';
      const label = stageData.filename || '있음';
      badgeHtml = `<span class="stage-status-badge sb-done" title="${escHtml(label)}">${escHtml(label.length > 14 ? label.slice(0,12)+'…' : label)}</span>`;
      const regenBtn = id === 'typer'
        ? `<button class="s-btn s-auto" data-action="typer-generate" data-key="${escHtml(key)}" title="1단 HWPX를 2단 타이퍼 양식으로 재변환">재생성</button>`
        : '';
      actionsHtml = `<a class="s-btn s-dl" href="/api/pipeline/${encodeURIComponent(key)}/stages/${id}/download" target="_blank">다운로드</a>
        ${regenBtn}
        <button class="s-btn s-upload" data-action="stage-upload" data-key="${escHtml(key)}" data-stage="${id}">교체</button>
        <button class="s-btn s-del" data-action="stage-delete" data-key="${escHtml(key)}" data-stage="${id}">삭제</button>`;
    } else {
      badgeHtml = `<span class="stage-status-badge sb-none">없음</span>`;
      const autoBtn = id === 'typer'
        ? `<button class="s-btn s-auto" data-action="typer-generate" data-key="${escHtml(key)}" title="1단 HWPX를 2단 타이퍼 양식으로 자동 변환">자동 생성</button>`
        : '';
      actionsHtml = `${autoBtn}<button class="s-btn s-upload" data-action="stage-upload" data-key="${escHtml(key)}" data-stage="${id}">업로드</button>`;
    }
  }

  return `<div class="${cardClass}">
    <div class="stage-num">STEP ${step}</div>
    <div class="stage-name">${escHtml(name)}</div>
    ${badgeHtml}
    <div class="stage-actions">${actionsHtml}</div>
  </div>`;
}

function renderPipelineDetail(key, entry) {
  const cards = STAGES.map(st => renderStageCard(key, entry, st)).join('');
  return `<div class="stage-cards">${cards}</div>`;
}

function renderMatrix() {
  const tbody = $('matrix-tbody');
  const schools = [...gConfig.schools].sort((a, b) => a.localeCompare(b, 'ko'));

  if (!schools.length) {
    tbody.innerHTML = `<tr><td colspan="2"><div id="matrix-empty">학교를 추가해 변환을 시작하세요.</div></td></tr>`;
    return;
  }

  tbody.innerHTML = '';
  schools.forEach(school => {
    const key = buildRegistryKey(school, gCurrentSubject);
    const entry = gRegistry[key] || null;

    const summaryTr = document.createElement('tr');
    summaryTr.className = 'summary-row';
    summaryTr.dataset.key = key;

    summaryTr.innerHTML = `
      <td>
        <div class="school-cell">
          <span>${escHtml(school)}</span>
          <button class="del-school-btn" title="학교 삭제" data-school="${escHtml(school)}">✕</button>
        </div>
      </td>
      <td class="summary-pipe-td">${renderPipeSummary(key, entry)}</td>
    `;

    const detailTr = document.createElement('tr');
    detailTr.className = 'pipeline-expand-row' + (gExpandedRows.has(key) ? ' open' : '');
    detailTr.dataset.key = key;

    const detailTd = document.createElement('td');
    detailTd.className = 'pipeline-expand-td';
    detailTd.setAttribute('colspan', '2');
    detailTd.innerHTML = renderPipelineDetail(key, entry);
    detailTr.appendChild(detailTd);

    tbody.appendChild(summaryTr);
    tbody.appendChild(detailTr);

    if (!entry || entry.status === 'error') {
      const pipeTd = summaryTr.querySelector('.summary-pipe-td');
      setupDropTarget(pipeTd, school, key);
    }
  });

  bindMatrixEvents(tbody);
}

function bindMatrixEvents(tbody) {
  tbody.querySelectorAll('.del-school-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      deleteSchool(btn.dataset.school);
    });
  });

  tbody.querySelectorAll('.upload-btn[data-key]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      triggerUpload(btn.dataset.school, btn.dataset.key);
    });
  });

  tbody.querySelectorAll('.pipe-summary[data-key]').forEach(el => {
    el.addEventListener('click', () => togglePipeline(el.dataset.key));
  });

  tbody.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const action = el.dataset.action;
      const key = el.dataset.key;
      if (action === 'pdf-upload') {
        const school = keyToSchool(key);
        triggerUpload(school, key);
      } else if (action === 'stage-upload') {
        uploadStageFile(key, el.dataset.stage);
      } else if (action === 'stage-delete') {
        deleteStageFile(key, el.dataset.stage);
      } else if (action === 'delete-job') {
        deleteJob(key, el.dataset.jobId);
      } else if (action === 'typer-generate') {
        generateTyperFile(key);
      }
    });
  });
}

function togglePipeline(key) {
  if (gExpandedRows.has(key)) {
    gExpandedRows.delete(key);
  } else {
    gExpandedRows.add(key);
  }
  const summaryTr = document.querySelector(`.summary-row[data-key="${CSS.escape(key)}"]`);
  const detailTr  = summaryTr?.nextElementSibling;
  if (!summaryTr || !detailTr) return;

  if (gExpandedRows.has(key)) {
    detailTr.classList.add('open');
    // 열 때마다 최신 데이터로 재렌더링
    const entry = gRegistry[key] || null;
    const td = detailTr.querySelector('.pipeline-expand-td');
    if (td) {
      td.innerHTML = renderPipelineDetail(key, entry);
      bindDetailEvents(detailTr, key);
    }
  } else {
    detailTr.classList.remove('open');
  }

  const icon = summaryTr.querySelector('.pipe-toggle-icon');
  if (icon) icon.textContent = gExpandedRows.has(key) ? '▲' : '▼';
}

function refreshCell(key) {
  const summaryTr = document.querySelector(`.summary-row[data-key="${CSS.escape(key)}"]`);
  if (!summaryTr) {
    renderMatrix();
    return;
  }
  const entry = gRegistry[key] || null;
  const pipeTd = summaryTr.querySelector('.summary-pipe-td');
  pipeTd.innerHTML = renderPipeSummary(key, entry);

  if (gExpandedRows.has(key)) {
    const detailTr = summaryTr.nextElementSibling;
    if (detailTr) {
      detailTr.querySelector('.pipeline-expand-td').innerHTML = renderPipelineDetail(key, entry);
      bindDetailEvents(detailTr, key);
    }
  }

  if (!entry || entry.status === 'error') {
    const school = keyToSchool(key);
    setupDropTarget(pipeTd, school, key);
  }

  pipeTd.querySelectorAll('.upload-btn[data-key]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      triggerUpload(btn.dataset.school, btn.dataset.key);
    });
  });

  const pipeSummary = pipeTd.querySelector('.pipe-summary[data-key]');
  if (pipeSummary) {
    pipeSummary.addEventListener('click', () => togglePipeline(pipeSummary.dataset.key));
  }
}

function bindDetailEvents(detailTr, key) {
  detailTr.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const action = el.dataset.action;
      const k = el.dataset.key;
      if (action === 'pdf-upload') {
        triggerUpload(keyToSchool(k), k);
      } else if (action === 'stage-upload') {
        uploadStageFile(k, el.dataset.stage);
      } else if (action === 'stage-delete') {
        deleteStageFile(k, el.dataset.stage);
      } else if (action === 'delete-job') {
        deleteJob(k, el.dataset.jobId);
      } else if (action === 'typer-generate') {
        generateTyperFile(k);
      }
    });
  });
}

function setupDropTarget(el, school, key) {
  el.addEventListener('dragover', e => {
    e.preventDefault();
    el.querySelector('.upload-btn')?.classList.add('drag-over');
  });
  el.addEventListener('dragleave', () => {
    el.querySelector('.upload-btn')?.classList.remove('drag-over');
  });
  el.addEventListener('drop', e => {
    e.preventDefault();
    el.querySelector('.upload-btn')?.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file, school, key);
  });
}

let _pendingUploadSchool = '';
let _pendingUploadKey    = '';

function triggerUpload(school, key) {
  _pendingUploadSchool = school;
  _pendingUploadKey    = key;
  const inp = $('global-file-input');
  inp.value = '';
  inp.click();
}

$('global-file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (file && _pendingUploadSchool) {
    handleFile(file, _pendingUploadSchool, _pendingUploadKey);
  }
  _pendingUploadSchool = '';
  _pendingUploadKey    = '';
});

let _pendingStageKey   = '';
let _pendingStageId    = '';

async function generateTyperFile(key) {
  const btn = document.querySelector(`[data-action="typer-generate"][data-key="${CSS.escape(key)}"]`);
  const origText = btn?.textContent || '자동 생성';
  if (btn) { btn.disabled = true; btn.textContent = '생성중…'; }
  try {
    const res = await apiFetch(`/api/pipeline/${encodeURIComponent(key)}/typer/generate`, {
      method: 'POST',
    });
    if (!res.ok) {
      const d = await res.json().catch(() => ({}));
      throw new Error(d.detail || `HTTP ${res.status}`);
    }
    const data = await res.json();
    if (!gRegistry[key]) gRegistry[key] = {};
    if (!gRegistry[key].stages) gRegistry[key].stages = {};
    gRegistry[key].stages.typer = { filename: data.filename, auto: true };
    refreshCell(key);
    showToast('타이퍼 양식 생성 완료', 'ok');
  } catch(e) {
    if (e.message !== 'unauthenticated') showToast(`생성 실패: ${e.message}`, 'err');
    if (btn) { btn.disabled = false; btn.textContent = origText; }
  }
}

function uploadStageFile(key, stage) {
  _pendingStageKey = key;
  _pendingStageId  = stage;
  const inp = $('stage-file-input');
  inp.value = '';
  inp.click();
}

$('stage-file-input').addEventListener('change', async e => {
  const file = e.target.files[0];
  const key   = _pendingStageKey;
  const stage = _pendingStageId;
  _pendingStageKey = '';
  _pendingStageId  = '';
  if (!file || !key || !stage) return;

  try {
    const fd = new FormData();
    fd.append('file', file);
    const res = await apiFetch(`/api/pipeline/${encodeURIComponent(key)}/stages/${stage}`, {
      method: 'POST',
      body: fd,
    });
    if (!res.ok) {
      const d = await res.json().catch(() => ({}));
      throw new Error(d.detail || `HTTP ${res.status}`);
    }
    const data = await res.json();
    if (!gRegistry[key]) gRegistry[key] = {};
    if (!gRegistry[key].stages) gRegistry[key].stages = {};
    gRegistry[key].stages[stage] = data.stage || { filename: file.name };
    refreshCell(key);
    showToast(`${stage} 업로드 완료`, 'ok');
  } catch(e) {
    if (e.message !== 'unauthenticated') showToast(`업로드 실패: ${e.message}`, 'err');
  }
});

async function deleteStageFile(key, stage) {
  if (!confirm(`"${stage}" 파일을 삭제할까요?`)) return;
  try {
    const res = await apiFetch(`/api/pipeline/${encodeURIComponent(key)}/stages/${stage}`, {
      method: 'DELETE',
    });
    if (!res.ok) {
      const d = await res.json().catch(() => ({}));
      throw new Error(d.detail || `HTTP ${res.status}`);
    }
    if (gRegistry[key]?.stages) delete gRegistry[key].stages[stage];
    refreshCell(key);
    showToast(`${stage} 삭제됨`, 'warn');
  } catch(e) {
    if (e.message !== 'unauthenticated') showToast(`삭제 실패: ${e.message}`, 'err');
  }
}

async function deleteJob(key, jobId) {
  if (!confirm('HWPX 변환 결과를 삭제할까요?')) return;
  try {
    const res = await apiFetch(`/api/jobs/${encodeURIComponent(jobId)}`, { method: 'DELETE' });
    if (!res.ok) {
      const d = await res.json().catch(() => ({}));
      throw new Error(d.detail || `HTTP ${res.status}`);
    }
    delete gRegistry[key];
    gExpandedRows.delete(key);
    renderMatrix();
    showToast('삭제됨', 'warn');
  } catch(e) {
    if (e.message !== 'unauthenticated') showToast(`삭제 실패: ${e.message}`, 'err');
  }
}

async function handleFile(file, school, registryKey) {
  if (!file.name.toLowerCase().endsWith('.pdf') && file.type !== 'application/pdf') {
    showToast('PDF 파일만 업로드할 수 있습니다.', 'err');
    return;
  }

  gRegistry[registryKey] = { status: 'converting', _lastLog: '업로드 중...', pdf_name: file.name };
  refreshCell(registryKey);

  const customFilename = registryKey + '.hwpx';
  const fd = new FormData();
  fd.append('file', file);
  fd.append('full_content', 'false');
  fd.append('custom_filename', customFilename);

  let jobId;
  try {
    const res = await apiFetch('/convert', { method: 'POST', body: fd });
    if (!res.ok) {
      const d = await res.json().catch(() => ({}));
      throw new Error(d.detail || `HTTP ${res.status}`);
    }
    const data = await res.json();
    jobId = data.job_id;
  } catch(e) {
    if (e.message === 'unauthenticated') return;
    gRegistry[registryKey] = { status: 'error', _errorMsg: e.message };
    refreshCell(registryKey);
    showToast(`업로드 실패: ${e.message}`, 'err');
    return;
  }

  await registerJob(registryKey, jobId, gCurrentSubject, school);
  gRegistry[registryKey] = {
    ...(gRegistry[registryKey] || {}),
    job_id: jobId,
    status: 'converting',
    _lastLog: '변환 시작...',
  };
  refreshCell(registryKey);
  subscribeSSE(registryKey, jobId);
}

function subscribeSSE(registryKey, jobId) {
  if (gActiveSse[registryKey]) {
    gActiveSse[registryKey].close();
    delete gActiveSse[registryKey];
  }

  const es = new EventSource(`/stream/${jobId}`);
  gActiveSse[registryKey] = es;

  es.addEventListener('message', e => {
    const entry = gRegistry[registryKey] || {};
    entry._lastLog = e.data;
    entry.status   = 'converting';
    gRegistry[registryKey] = entry;
    refreshCell(registryKey);
  });

  es.addEventListener('done', () => {
    es.close();
    delete gActiveSse[registryKey];
    const entry = gRegistry[registryKey] || {};
    entry.status   = 'done';
    entry._lastLog = '';
    gRegistry[registryKey] = entry;
    apiFetch('/api/registry/register', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        registry_key: registryKey,
        job_id: entry.job_id,
        subject: gCurrentSubject,
        school: keyToSchool(registryKey),
        pdf_name: entry.pdf_name || '',
        status: 'done',
      }),
    }).catch(() => {});
    refreshCell(registryKey);
    showToast(`변환 완료: ${keyToSchool(registryKey)}`, 'ok');
  });

  es.addEventListener('error', e => {
    const msg = e.data || 'SSE 오류';
    es.close();
    delete gActiveSse[registryKey];
    const entry = gRegistry[registryKey] || {};
    entry.status    = 'error';
    entry._errorMsg = msg;
    gRegistry[registryKey] = entry;
    refreshCell(registryKey);
    showToast(`변환 실패: ${keyToSchool(registryKey)} — ${msg}`, 'err');
  });
}

async function initUser() {
  try {
    const res = await apiFetch('/api/me');
    if (!res.ok) { window.location.href = '/auth/login'; return; }
    const me = await res.json();
    if (!me.authenticated) { window.location.href = '/auth/login'; return; }
    $('user-name').textContent = me.name || me.email;
    if (me.is_admin) $('admin-link').style.display = 'inline';
  } catch(e) {
    if (e.message !== 'unauthenticated') window.location.href = '/auth/login';
  }
}

function restoreActiveSse() {
  Object.entries(gRegistry).forEach(([key, entry]) => {
    if (entry && entry.status === 'converting' && entry.job_id) {
      subscribeSSE(key, entry.job_id);
    }
  });
}

async function init() {
  initYearSelect();
  loadPeriodFromStorage();
  await initUser();
  await loadConfig();
  await loadRegistry();
  renderSubjectTabs();
  renderMatrix();
  restoreActiveSse();
}

init();
</script>
</body>
</html>
